<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Cloud Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .slot-btn { transition: all 0.2s; border-radius: 8px; }
        .slot-btn:hover { transform: scale(1.01); }
        #badge { font-size: 0.8rem; vertical-align: middle; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 800px;">
        <h2 class="text-center mb-4 text-primary">Live Timetable Service</h2>
        
        <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="grid-tab" data-bs-toggle="tab" data-bs-target="#gridTab" type="button">
                    Timetable Grid
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#adminTab" type="button">
                    Admin Approvals <span id="badge" class="badge bg-danger">0</span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="gridTab">
                <div id="timetable-container" class="d-grid gap-2">
                    </div>
            </div>

            <div class="tab-pane fade" id="adminTab">
                <div id="pending-list" class="list-group">
                    </div>
                <div id="empty-msg" class="text-center text-muted mt-3" style="display: none;">
                    No pending requests at the moment.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use the WebSocket protocol (ws://) instead of HTTP (http://)
        const socket = new WebSocket("ws://localhost:8000/ws");
        const TARGET_DATE = "2026-04-07";

        // --- 1. RECEIVING DATA FROM SERVER ---
        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            console.log("Real-time update received:", data);
            
            // Re-render both tabs whenever the server broadcasts a change
            renderGrid(data.grid[TARGET_DATE]);
            renderAdminQueue(data.pending);
        };

        socket.onclose = function() {
            alert("Connection lost. Please refresh the page or restart the backend server.");
        };

        // --- 2. RENDERING LOGIC ---
        function renderGrid(dayData) {
            const container = document.getElementById('timetable-container');
            container.innerHTML = "";
            
            for (const [time, slot] of Object.entries(dayData)) {
                const isOccupied = slot !== null;
                const displayText = isOccupied ? `${slot.member_id}: ${slot.task}` : "[ Empty Slot ]";
                
                // Color coding: Gold for Admin, LightBlue for Members, Gray for Empty
                let btnClass = "btn-outline-secondary";
                if (isOccupied) {
                    btnClass = (slot.member_id === "000") ? "btn-warning" : "btn-info";
                }

                container.innerHTML += `
                    <div class="d-flex align-items-center mb-2">
                        <div class="fw-bold me-3 text-secondary" style="width: 70px;">${time}</div>
                        <button class="btn ${btnClass} w-100 text-start slot-btn p-3" 
                                onclick="handleClick('${time}', ${isOccupied})">
                            ${displayText}
                        </button>
                    </div>`;
            }
        }

        function renderAdminQueue(pending) {
            const list = document.getElementById('pending-list');
            const badge = document.getElementById('badge');
            const emptyMsg = document.getElementById('empty-msg');
            
            badge.innerText = pending.length;
            list.innerHTML = "";
            
            if (pending.length === 0) {
                emptyMsg.style.display = "block";
                return;
            }
            emptyMsg.style.display = "none";

            pending.forEach(req => {
                list.innerHTML += `
                    <div class="list-group-item list-group-item-action mb-2 border rounded">
                        <div class="d-flex w-100 justify-content-between align-items-center">
                            <h6 class="mb-1 text-uppercase fw-bold text-primary">${req.action} Request</h6>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-success" onclick="processApproval(${req.request_id}, true)">Approve</button>
                                <button class="btn btn-sm btn-danger" onclick="processApproval(${req.request_id}, false)">Reject</button>
                            </div>
                        </div>
                        <p class="mb-1"><b>User:</b> ${req.member_id} | <b>Time:</b> ${req.time} | <b>Task:</b> ${req.task || 'N/A'}</p>
                        <small class="text-muted italic"><b>Reason:</b> ${req.reason}</small>
                    </div>`;
            });
        }

        // --- 3. SENDING COMMANDS TO SERVER ---
        function handleClick(time, isOccupied) {
            let action = "ADD";
            let reason = "";

            if (isOccupied) {
                const choice = prompt("Slot is occupied!\nType 'O' to Overwrite.\nType 'D' to Delete.\n(Cancel to abort)");
                if (!choice) return; // Cancel Process
                
                const c = choice.toUpperCase();
                if (c === 'O') action = "OVERWRITE";
                else if (c === 'D') action = "REMOVE";
                else return alert("Invalid choice.");
            }

            const uid = prompt("Enter Member ID (000 for Admin):");
            if (!uid) return;

            // Differentiate member vs admin delete
            if (uid === "000" && action === "REMOVE") action = "ADMIN_REMOVE";

            let task = "";
            if (action === "ADD" || action === "OVERWRITE") {
                task = prompt("Enter Task Description:");
                if (!task) return alert("Task is required.");
            }

            // Reason is required for every network-bound action
            reason = prompt(`Why are you performing this ${action}?`);
            if (!reason) return alert("A reason is required for the audit trail.");

            const payload = {
                action: action,
                member_id: uid,
                target_member: uid,
                date: TARGET_DATE,
                time: time,
                task: task,
                reason: reason
            };

            // Send JSON via WebSocket
            socket.send(JSON.stringify(payload));
        }

        function processApproval(reqId, approved) {
            const adminId = prompt("Enter Admin Auth ID (000):");
            if (adminId !== "000") return alert("Unauthorized access.");

            const payload = {
                action: "APPROVE_PENDING",
                member_id: "000",
                request_id: reqId,
                approved: approved
            };

            socket.send(JSON.stringify(payload));
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
