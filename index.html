<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Cloud Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .slot-btn { transition: all 0.2s; border-radius: 8px; }
        .slot-btn:hover { transform: scale(1.01); }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary m-0">Live Timetable Service</h2>
            <div id="user-display" class="badge bg-secondary p-2 fs-6">Not Logged In</div>
        </div>
        
        <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#gridTab" type="button">Grid</button>
            </li>
            <li class="nav-item" id="admin-nav" style="display: none;">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#adminTab" type="button">
                    Admin Approvals <span id="badge" class="badge bg-danger">0</span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="gridTab">
                <div id="timetable-container" class="d-grid gap-2"></div>
            </div>
            <div class="tab-pane fade" id="adminTab">
                <div id="pending-list" class="list-group"></div>
                <div id="empty-msg" class="text-center text-muted mt-3" style="display: none;">No pending requests.</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/network_client.js"></script>
</body>
</html>
